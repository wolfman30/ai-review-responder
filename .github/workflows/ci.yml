name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run unit tests
        run: npx vitest run --reporter=verbose
        env:
          ANTHROPIC_API_KEY: test-key
          STRIPE_SECRET_KEY: test-key
          STRIPE_WEBHOOK_SECRET: test-webhook-secret
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          GOOGLE_CLIENT_ID: test-client-id
          GOOGLE_CLIENT_SECRET: test-client-secret
          CRON_SECRET: test-cron-secret

      - name: Run schema drift test (Turso)
        run: npx vitest run __tests__/lib/schema-drift.test.ts --reporter=verbose
        env:
          DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}

  deploy-gate:
    name: Deploy Gate
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Tests passed — Vercel auto-deploy can proceed
        run: echo "✅ All tests passed. Vercel will deploy."
